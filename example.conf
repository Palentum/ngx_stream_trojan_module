# Example nginx.conf for ngx_stream_trojan_module.
#
# For a dynamic build, uncomment and adjust the module path:
# load_module modules/ngx_stream_trojan_module.so;

worker_processes auto;

events {
    worker_connections 1024;
}

stream {
    # Public Trojan-over-TLS listener.
    server {
        listen 443 ssl;
        server_name example.com;

        ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

        resolver 1.1.1.1 8.8.8.8 valid=60s;
        resolver_timeout 5s;

        trojan on;
        trojan_password change-me another-password;
        trojan_fallback 127.0.0.1:8080;

        trojan_connect_timeout 60s;
        trojan_timeout 10m;
        trojan_udp_timeout 10m;
        trojan_buffer_size 32k;

        # Optional server-level DoH. Used only for direct domain targets that do
        # not match trojan_dns_rules; DNS rule groups may use DoH URLs too.
        # trojan_doh https://dns.google/dns-query;

        # Optional data files for DNS rules and routes.
        # trojan_geosite /etc/nginx/geosite.dat;
        # trojan_geoip /etc/nginx/geoip.dat;
        # trojan_dns_rules /etc/nginx/trojan-dns-rules.yml;

        # Route mode: first matching trojan_routes block wins.
        trojan_route on;

        trojan_routes {
            rules domain:streaming.example port:443;

            outbounds_socks5 127.0.0.1:1080 username=proxyuser password=proxypass block=h3;
            outbounds_direct ip_prefer=ipv4 block=none;
        }

        trojan_routes {
            rule *;

            outbounds_direct ip_prefer=auto;
        }
    }

    # Local no-auth SOCKS5 + HTTP CONNECT entry point.
    # This listener is loopback-only and reuses the public Trojan server's
    # route/DNS/outbound configuration selected by trojan_server.
    server {
        listen 127.0.0.1:1086;

        socks5 on;
        socks5_udp on;
        http_proxy on;

        trojan_server example.com:443;
    }
}

http {
    # Fallback site for non-Trojan TLS/application traffic.
    server {
        listen 127.0.0.1:8080;
        server_name example.com;

        root /var/www/html;
        index index.html;
    }
}

# Example /etc/nginx/trojan-dns-rules.yml:
#
# https://dns.google/dns-query:
#   strategy: ipv4_first
#   rules:
#     - domain:google.com
#
# 8.8.8.8:53,8.8.4.4:53:
#   strategy: ipv4_first
#   rules:
#     - domain:google.com
#     - regexp:.*\.googlevideo\.com
#
# 1.1.1.1:53,1.0.0.1:53:
#   strategy: auto
#   rules:
#     - domain:example.org
